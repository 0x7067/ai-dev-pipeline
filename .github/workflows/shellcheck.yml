name: ShellCheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: .claude/hooks/_hook_lib.sh
          check_together: 'yes'
          severity: warning
        env:
          SHELLCHECK_OPTS: '-x'
